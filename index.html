<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Button DOM Calculator</title>

    <script src="app2.js" defer></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ebf5df, #bad4aa);
        }
    </style>
</head>
<body class="vh-100 d-flex flex-column justify-content-center align-items-center">

    <!-- Calculator Container -->
    <div class="container" style=" max-width: 450px;">
        <div class="card shadow-lg p-4 bg-white">
            <h2 class="text-center mb-4 text-dark fw-bold">Multi-Button Calculator</h2>

            <!-- Input fields for the numbers -->
            <div class="mb-3">
                <label for="input" class="form-label">First Number</label>
                <input id="num1" class="form-control" placeholder="First Number">
            </div>
            <div class="mb-4">
                <label for="final-input" class="form-label">Second Number</label>
                <input id="num2" class="form-control" placeholder="Second Number">
            </div>


            <!-- Action Buttons -->
            <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
                <button id="addBtn" class="btn btn-primary w-20">Add</button>
                <button id="subBtn" class="btn btn-secondary w-20">Subtract</button>
                <button id="mulBtn" class="btn btn-success w-20">Multiply</button>
                <button id="divBtn" class="btn btn-info text-white w-20">Divide</button>
                <button id="clearBtn" class="btn btn-danger w-100 ">Clear</button>
            </div>

            <!-- Display area for the result -->
            <div class="alert alert-light text-center border m-0">
                <p id="resultText" class="fs-5 fw-bold m-0 text-secondary">Result: </p>
            </div>

        </div>
    </div>

</body>
</html>
